<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1f26;
    color: #fff;
    margin: 0;
    padding: 0;
  }
  header {
    background: #2b2d3a;
    padding: 20px;
    text-align: center;
    font-size: 2rem;
    font-weight: bold;
  }
  main {
    padding: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: #2b2d3a;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .card h2 {
    color: #7289da;
    margin-top: 0;
  }
  button {
    background: #7289da;
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 10px 20px;
    cursor: pointer;
  }
  button:hover { background: #5b6eae; }
</style>
</head>
<body>

<header>Dashboard</header>

<main>
  <div class="card" id="login-card">
    <h2>Logowanie</h2>
    <p>Kliknij przycisk, aby zalogować się:</p>
    <button id="login-btn">Zaloguj się</button>
  </div>

  <div class="card" id="welcome-card" style="display:none;">
    <h2>Witaj, <span id="username">Użytkowniku</span>!</h2>
    <p>ID: <span id="userid">0000</span></p>
    <button id="logout-btn">Wyloguj się</button>
  </div>

  <div class="card">
    <h2>Informacje</h2>
    <p>Ta strona jest statyczna i działa lokalnie w przeglądarce. Wszystko jest bez bota i backendu.</p>
  </div>
</main>

<script>
  const loginBtn = document.getElementById('login-btn');
  const logoutBtn = document.getElementById('logout-btn');
  const loginCard = document.getElementById('login-card');
  const welcomeCard = document.getElementById('welcome-card');
  const usernameEl = document.getElementById('username');
  const useridEl = document.getElementById('userid');

  loginBtn.addEventListener('click', () => {
    const fakeUser = { username: "Janek", id: "123456789" };
    usernameEl.textContent = fakeUser.username;
    useridEl.textContent = fakeUser.id;
    loginCard.style.display = "none";
    welcomeCard.style.display = "block";
  });

  logoutBtn.addEventListener('click', () => {
    loginCard.style.display = "block";
    welcomeCard.style.display = "none";
  });
</script>

</body>
</html>
